[config]
schemaVersion = "0.0.1"

[package]
namespace = "Hentilador"
name = "ItemCapPlus"
description = "Increase the cap for all scrap and some items"
versionNumber = "1.0.2"
websiteUrl = "https://github.com/Hentilador/ItemCapPlus"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/ItemCapPlus.dll"
target = "ItemCapPlus.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]


